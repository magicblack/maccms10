<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no">
    <title>系统提示......</title>
    <link rel="stylesheet" href="{$maccms.path}static/css/home.css">
    
    <script src="{$maccms.path}static/js/jquery.js"></script>
    {include file="public/jsvar"}
    <script src="{$maccms.path}static/js/home.js"></script>
	<link rel="stylesheet" type="text/css" href="{$maccms.path_tpl}/asset/css/vod-detail_pwd.css" />
</head>
<body>
<div class="mac_msg_jump">
    <div class="msg_jump_tit" data-lang="string_xitonts">系统提示...</div>
    <div class="title" data-lang="dear_password">亲爱的访问此数据需要密码哦~~~</div>
    <div class="text">
        <form id="form1" name="form1" action="" style="margin:0;width:400px;text-align: center;" method="post">
            <div class="item">
                <label data-lang="string_password">密码：</label>
                <input type="password" name="pwd" data-placeholder="password_here" placeholder="请在此输入访问密码..."/>
                {if condition="$obj.vod_pwd_url neq ''"}
                    <a href="{$obj.vod_pwd_url}" target="_blank" data-lang="click_to_get_password">点击获取密码</a>
                {else/}
                    <span><span data-lang="string_password">密码</span>：{$obj.vod_pwd}</span>
                {/if}
            </div>
            <div class="item">
                <a class="submit_btn" href="javascript:;" onclick="MAC.Pwd.Check(this)" data-mid="1" data-id="{$obj.vod_id}" data-type="1" data-lang="click_to_confirm">点击确认</a>
            </div>
        </form>
    </div>
</div>
<script type="text/javascript">

</script>
</body>
</html>
