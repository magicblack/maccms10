<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>{$maccms.site_name}</title>
    <meta name="keywords" content="{$maccms.site_keywords}" />
    <meta name="description" content="{$maccms.site_description}" />
    {include file="public/include"}
    {include file="public/include_rating_svg" /}
	<link rel="stylesheet" type="text/css" href="{$maccms.path_tpl}/asset/css/website-detail.css" />
</head>

<body data-detail-id="{$param.id|default='0'}">
{include file="public/head"}

<div class="bread-crumb-nav fn-clear show-pc">
    <ul class="bread-crumbs js-website-breadcrumb">
        <li class="home">
            <a href="{$maccms.path}" data-lang="string_home">首页</a></li>
    </ul>
</div>
<div class="hot_banner ">
    <div class="detail_list_box">
         <div class="detail_list">
				<div class="content_box clearfix">
					<div class="content_thumb fl">
						<a class="vodlist_thumb lazyload js-website-thumb" href="javascript:;" title="" data-original="{:mac_url_img(!empty($tplconfig['theme']['lazy']) ? $maccms['path'].$tplconfig['theme']['lazy'] : $maccms['path_tpl'].'/asset/img/load.gif')}">
						<span class="play hidden_xs"></span>
						</a>
					</div>
					<div class="content_detail content_top fl">
						<div class="pannel_head clearfix">
							<h2 class="title js-website-name"></h2>
						</div>
						<div id="detail_rating" class="fn-clear show-mobile"></div>
                    </div>
                    <div class="content_detail content_min fl">
                        <ul>
						<li class="data js-website-meta-line1"></li>
						<li class="data js-website-meta-line2"></li>
						<li class="data">
                            <span data-lang="string_fav2">收藏：</span>
                            <a href="javascript:void(0);" data-lang="string_wysc" style="cursor:pointer" class="mac_ulog" data-type="2" data-mid="{$maccms.mid}" data-id="{$param.id|default='0'}">我要收藏</a>
                        </li>
						</ul>

					</div>
					<div class="content_progress show-pc">
						<div class="js-website-rating-pc"></div>
					</div>

					<div class="content_detail content_min content_btn fl">

                        <div class="playbtn o_share ">
							<a class="btn btn_share open-share" href="javascript:;"><i class="iconfont">&#xe615;</i>&nbsp; <span data-lang="string_vod_share">分享</span>  </a>
							{include file="widget/share"}
						</div>
					</div>
				</div>
         </div>
    </div>
</div>
<div class="member-wrap">
    <div class="container ">
            <div class="pannel clearfix">
                <div class="pannel_head clearfix">
                    <h3 class="title">
                        <span data-lang="vod_like_watch">喜欢看</span>
                        <span class="tj-title js-website-rec-title"></span>
                        <span data-lang="vod_also_like">的人也喜欢</span>
                    </h3>
                </div>
                <ul class="vodlist vodlist_wi js-website-rec-list"></ul>
            </div>
        <div class="pannel clearfix" id="pinglun" >
            <div class="pannel_head clearfix">
                <span class="pull_right"> <span data-lang="string_play_yg">共</span> &nbsp;<font color="#40CC92"><em class="mac_total"></em></font>&nbsp; <span data-lang="string_play_tpl">条评论</span> </span>
                <h3 class="title" data-lang="string_play_pl">评论</h3>
            </div>
            <div class="mac_comment comm_list comm_list_box"
				data-id="{$param.id|default='0'}"
				data-mid="{$maccms.mid}"
				data-comment-login="{$comment.login|default='0'}"
				data-comment-verify="{$comment.verify|default='0'}"></div>
            <script>
                $(function(){
                    waitForMAC(function(){
                        var $box = $('#pinglun .comm_list_box').first();
                        var login = parseInt($box.attr('data-comment-login'), 10);
                        var verify = parseInt($box.attr('data-comment-verify'), 10);
                        MAC.Comment.Login = isNaN(login) ? 0 : login;
                        MAC.Comment.Verify = isNaN(verify) ? 0 : verify;
                        MAC.Comment.Init();
                        MAC.Comment.Show(1);
                    });
                });
            </script>
        </div>

    </div>
</div>
<div style="width:30rem;margin: 2.5rem auto;" class="show-pc">
	{include file="public/friendLink" }
</div>

<span style="display:none" class="mac_ulog_set" alt="设置内容页浏览记录" data-type="1" data-mid="{$maccms.mid}" data-id="{$param.id|default='0'}" data-sid="{$param.sid|default=''}" data-nid="{$param.nid|default=''}"></span>

<span style="display:none" class="mac_history_set js-website-history" alt="设置History历史记录" data-name="" data-pic=""></span>

{include file="public/foot"}
<script type="text/javascript" src="{$maccms.path_tpl}/asset/js/website-detail-ajax-render.js"></script>
</body>
</html>
