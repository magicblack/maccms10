                        <div class="head_search_row head_search_row_capsule">
                            <form id="search" name="search" method="get" onsubmit="return qrsearch(this);">
                                <div class="head_search_capsule">
                                    <span class="head_search_capsule_hot" aria-hidden="true"><img src="{$maccms.path_tpl}images/svg/hot.svg" alt=""></span>
                                    <div class="head_search_capsule_field">
                                        <input id="txt" autocomplete="off" type="text" name="wd" class="mac_wd form_control" value="{$param.wd}" placeholder="">
                                        <div class="head_hot_overlay head_hot_overlay_home" data-fallback-hot-lang="string_home_search_placeholder" data-hot-words="{:htmlspecialchars(isset($maccms['search_hot']) ? (string)$maccms['search_hot'] : '', ENT_QUOTES, 'UTF-8')}" data-permanent-hot="{:htmlspecialchars('永久域名: '.(isset($_SERVER['HTTP_HOST']) ? $_SERVER['HTTP_HOST'] : ''), ENT_QUOTES, 'UTF-8')}" id="headHotOverlayPc">
                                            <div class="head_hot_overlay_viewport"><div class="head_hot_overlay_track"></div></div>
                                        </div>
                                    </div>
                                    <button class="submit head_search_capsule_submit" id="searchbutton" type="submit" name="submit" title="搜索" data-title="string_search">
                                        <img class="head_search_capsule_ai_ico" src="{$maccms.path_tpl}images/home/search_ai.gif" alt="" width="20" height="20">
                                        <span data-lang="string_search">搜索</span>
                                    </button>
                                </div>
                            </form>
                        </div>
