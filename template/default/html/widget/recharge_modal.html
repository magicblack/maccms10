  function rcApiPhpBase() {
    var u = String($('#recharge-overlay').attr('data-rc-order-create-url') || '');

  }

  function findRcMethodByKey(methods, paymentKey) {
    var pk = String(paymentKey || '').toLowerCase();
    if (!methods || !methods.length) return null;
    for (var i = 0; i < methods.length; i++) {
      var m = methods[i];
      if (m && String(m.key || '').toLowerCase() === pk) return m;
    }
    return null;

  function buildRcPaytypeCardsFromApi(paytypes) {
    if (!paytypes || !paytypes.length) return '';

  function normalizeRcConfigFromApi(r) {
    var inf = r && (r.info || r.data);
    if (!inf) return null;
    var methods = inf.methods || [];
    var ext_list = {};
    for (var i = 0; i < methods.length; i++) {
      var m = methods[i];
      if (m && Number(m.enabled) === 1 && m.key) {
        ext_list[m.key] = m.name != null ? String(m.name) : String(m.key);
      }
    }
    return {
      is_login: inf.is_login != null ? inf.is_login : 0,
      user_points: inf.user_points != null ? inf.user_points : 0,
      pay_min: inf.min != null ? inf.min : inf.pay_min != null ? inf.pay_min : 1,
      pay_scale: inf.scale != null ? inf.scale : inf.pay_scale != null ? inf.pay_scale : 1,
      ext_list: ext_list,
      methods: methods

  function rcGopayUrl() {
    return $('#recharge-overlay').attr('data-rc-gopay-url') || '/api.php/payment/gopay';

  function rcExtractRedirectUrlFromHtml(html) {
    if (!html || typeof html !== 'string') return '';
    var m = html.match(
      /(?:(?:window|top|parent|self)\.)?location\.href\s*=\s*["']([^"']+)["']/i
    );
    return m ? m[1] : '';
  }

  function rcLooksLikePaymentHtml(s) {
    if (!s || typeof s !== 'string') return false;
    var t = s.replace(/^\uFEFF/, '').trim();
    if (!t || t.charAt(0) !== '<') return false;
    if (/<\s*(script|form|html|body)\b/i.test(t)) return true;
    if (/location\.(href|replace)\s*=/i.test(t)) return true;
    return false;
  }
  function rcParseGopayResponseText(text) {
    var s = String(text == null ? '' : text).replace(/^\uFEFF/, '').trim();
    if (!s) return { code: 0, msg: 'empty response' };
    var first = s.charAt(0);
    if (first === '{' || first === '[') {
      try {
        return JSON.parse(s);
      } catch (e) {
        return { code: 0, msg: 'invalid json' };
      }
    }
    if (rcLooksLikePaymentHtml(s)) {
      return {
        code: 1,
        msg: 'pay_html',
        info: {
          payment: '',
          order_code: '',
          payment_data: { type: 'html', html: s }
        }
      };
    }
    return { code: 0, msg: s.substring(0, 120) };
  }

  function rcIsExecutablePaymentHtml(html) {
    if (!html || typeof html !== 'string') return false;
    var s = html.replace(/^\uFEFF/, '').replace(/^\s+/, '');
    if (!s) return false;
    if (s.charAt(0) === '<') return true;
    return /<\s*(script|form|html|head|body|iframe|meta)\b/i.test(html);
  }

  function rcOpenPaymentHtmlDocument(html) {
    if (!html || typeof html !== 'string') return;
    if (rcIsExecutablePaymentHtml(html)) {
      var w0 = window.open('', '_blank');
      if (w0) {
        try {
          w0.document.open();
          w0.document.write(html);
          w0.document.close();
        } catch (e) {}
      }
      return;
    }
    var jumpUrl = rcExtractRedirectUrlFromHtml(html);
    if (jumpUrl) {
      window.open(jumpUrl, '_blank');
      return;
    }
    var w = window.open('', '_blank');
    if (w) {
      try {
        w.document.open();
        w.document.write(html);
        w.document.close();
      } catch (e) {}
    }
  }

  function rcOpenPaymentChannel(gopayInfo, opts) {
    var opts0 = opts || {};
    var target = opts0.target === '_self' ? '_self' : '_blank';
    var pd = (gopayInfo && gopayInfo.payment_data) || {};
    var type = pd.type;

    function go(u) {
      if (!u) return false;
      if (target === '_self') window.location.href = u;
      else window.open(u, '_blank');
      return true;
    }

    if (type === 'qrcode') {
      if (!pd.code_url) return false;
      var $h = $('#rcLoadingQrcodeHost');
      if ($h.length && typeof window.macRenderPaymentQrcode === 'function') {
        $h.empty();
        window.macRenderPaymentQrcode($h, pd.code_url, function () {});
        return true;
      }
      return false;
    }

    if ((type === 'form' || type === 'html') && pd.html) {
      if (target === '_self') {
        if (rcIsExecutablePaymentHtml(pd.html)) {
          try {
            document.open();
            document.write(pd.html);
            document.close();
          } catch (e) {
            return false;
          }
          return true;
        }
        var ju = rcExtractRedirectUrlFromHtml(pd.html);
        if (ju) {
          window.location.href = ju;
          return true;
        }
        try {
          document.open();
          document.write(pd.html);
          document.close();
        } catch (e) {
          return false;
        }
        return true;
      }
      rcOpenPaymentHtmlDocument(pd.html);
      return true;
    }

    if (type === 'data' && pd.data && typeof pd.data === 'object') {
      var payUrl = pd.data.pay_url || pd.data.url;
      if (payUrl) return go(payUrl);
      return false;
    }

    if (
      pd.action_url &&
      pd.fields &&
      typeof pd.fields === 'object' &&
      Object.keys(pd.fields).length > 0
    ) {
      var form = document.createElement('form');
      form.method = 'POST';
      form.action = pd.action_url;
      form.target = target === '_self' ? '_self' : '_blank';
      Object.keys(pd.fields).forEach(function (k) {
        var inp = document.createElement('input');
        inp.type = 'hidden';
        inp.name = k;
        inp.value = pd.fields[k];
        form.appendChild(inp);
      });
      document.body.appendChild(form);
      form.submit();
      document.body.removeChild(form);
      return true;
    }

    return false;
  }

          }
        } else {
          $('#rcInitLoading').text(
            (r && r.msg) ? String(r.msg) : rcGetLang('string_load_err', '加载失败，请稍后重试', 'Failed to load')
          );
        }
      },
      error: function(xhr) {
        $('#rcInitLoading').text(rcFriendlyAjaxMessage(xhr));
      }
    });
  };

  function createMemberUpgradeOrder() {
    var groupId = _context.group_id;
    var groupName = _context.group_name || '会员';
    var groupLong = _context.long;
    if (!groupId || !groupLong) {
      $('#rcInitLoading').text('会员参数错误，请返回重试');
      return;
    }
    $('#rcInitLoading').text('正在创建会员订单...');
    $.ajax({
      url: rcApiPhpBase() + '/user/upgrade_order_create',
      type: 'post',
      dataType: 'json',
      data: { group_id: groupId, long: groupLong },
      success: function(r){
        if (r.code == 1 && r.data) {
          _context.orderBiz = 'member_upgrade';
          _context.orderTitle = groupName;
          showPayPanel(r.data);
        } else {
          $('#rcInitLoading').text(r.msg || '创建订单失败，请重试');
        }
      },
      error: function(xhr) {
        $('#rcInitLoading').text(rcFriendlyAjaxMessage(xhr));
      }
    });
  }

  function rcFinishCreateOrderFromApi(r) {
    var row = r && (r.info || r.data);
    if (!row || !row.order_code) {
      rcStatusErr((r && r.msg) || rcGetLang('string_load_err', '创建订单失败', 'Order failed'));
      return;
    }
    if (row.order_id != null && String(row.order_id) !== '') {
      showPayPanel(row);
      return;
    }
    $.ajax({
      url: rcApiPhpBase() + '/order/get_detail',
      type: 'get',
      dataType: 'text',
      data: { order_code: row.order_code },
      success: function(text) {
        var r2 = rcParseJsonMaybe(text);
        var inf = r2 && (r2.info || r2.data);
        if (r2 && Number(r2.code) === 1 && inf && inf.order_id != null) {
          showPayPanel(
            $.extend({}, row, {
              order_id: inf.order_id,
              order_code: inf.order_code || row.order_code,
              order_price: row.order_price != null ? row.order_price : inf.order_price
            })
          );
        } else {
          rcStatusErr((r2 && r2.msg) || rcGetLang('string_load_err', '获取订单信息失败', 'Failed to load order'));
        }
      },
      error: function(xhr) {
        rcStatusErr(rcFriendlyAjaxMessage(xhr));
      }
    });
  }

  function renderAmountPanel(data) {
    $('#rcPoints').text(data.user_points);
    var amounts = [50, 100, 200, 500];
    var base = String(($('#recharge-overlay').attr('data-rc-img-base') || '')).replace(/\/?$/, '/');
    var html = '';
    for (var i = 0; i < amounts.length; i++) {
      var a = amounts[i];
      var ribbon = a === 200
        ? '<img class="rc-amt__ribbon" src="' + escRcAttr(base + 'recharge-ribbon-hot.png') + '" width="48" height="48" alt="" />'
        : '';
      var hotCls = a === 200 ? ' rc-amt--hot' : '';
      html += '<div class="rc-amt' + hotCls + '" data-amount="' + a + '" role="button" tabindex="0">' + ribbon
        + '<span class="rc-amt__yen">¥</span><span class="rc-amt__num">' + a + '</span></div>';
    }
    $('#rcAmountsGrid').html(html);
    var min = data.pay_min != null ? data.pay_min : 1;
    var scale = data.pay_scale != null ? data.pay_scale : 1;
    $('#rcPriceInput').val(min);
    $('#recharge-overlay .rc-amt').removeClass('active');
    $('#recharge-overlay .rc-amt[data-amount="' + min + '"]').addClass('active');
    var isEn = localStorage.getItem('lang') === '1';
    var tipTxt = isEn
      ? ('Minimum top-up is ' + min + ' CNY. 1 CNY = ' + scale + ' points.')
      : ('最小充值金额为' + min + '元，1元可以兑换' + scale + '金币');
    $('#rcTips').html(
      '<span class="rc-tips-inner"><img class="rc-tips-ico" src="' + escRcAttr(base + 'recharge-tip-ico.png')
      + '" width="18" height="18" alt="" /><span class="rc-tips-txt">' + tipTxt + '</span></span>'
    );
    $('#rcInitLoading').hide();
    $('#rcAmountPanel').show();
  }

  $(document).on('click', '#recharge-overlay .rc-amt', function() {
    $('#recharge-overlay .rc-amt').removeClass('active');
    $(this).addClass('active');
    $('#rcPriceInput').val($(this).data('amount'));
  });

  $(document).on('click', '#rcSubmitBtn', function() {
    var price = $('#rcPriceInput').val();
    if (Number(price) < 1) { rcStatusErr(rcGetLang('string_pay_price_err', '请输入充值金额', 'Enter amount')); return; }
    if (_config && Number(price) < _config.pay_min) {
      rcStatusErr(rcGetLang('user_zcts1', '最小充值金额为', 'Min ') + _config.pay_min + rcGetLang('user_yuan', '元', ''));
      return;
    }
    if (!_config || Number(_config.is_login) !== 1) {
      var loginUrl = url('user/login');
      var backUrl = encodeURIComponent(window.location.href || '/');
      rcStatusErr(rcGetLang('string_pay_login_first', '请先登录后完成下单支付', 'Please login first'));
      window.location.href = loginUrl + '?url=' + backUrl;
      return;
    }
    var $btn = $(this);
    $.ajax({
      url: rcOrderCreateUrl(),
      type: 'post',
      dataType: 'text',
      data: { price: price },
      beforeSend: function() { $btn.text('处理中...').prop('disabled', true); },
      success: function(text) {
        var r = rcParseJsonMaybe(text);
        if (!r) {
          rcStatusErr(rcGetLang('string_load_err', '加载失败，请稍后重试', 'Failed to load'));
          return;
        }
        if (Number(r.code) === 1) {
          rcFinishCreateOrderFromApi(r);
        } else {
          rcStatusErr((r && r.msg) || rcGetLang('string_load_err', '创建订单失败', 'Order failed'));
        }
      },
      error: function(xhr) {
        rcStatusErr(rcFriendlyAjaxMessage(xhr));
      },
      complete: function() { $btn.text('确认充值').prop('disabled', false); }
    });
  });

  function showPayPanel(orderData) {
    resetRcLoadingVisuals();
    $('#rcOrderCode').text(orderData.order_code);
    $('#rcOrderPrice').text(orderData.order_price);
    $('#rcPayOrderId').val(orderData.order_id || '');
    $('#rcPayOrderCode').val(orderData.order_code);
    $('#rcPayForm').attr('action', '#');
    if (_config && _config.ext_list) {
      var html = '';
      for (var key in _config.ext_list) {
        if (_config.ext_list.hasOwnProperty(key)) {
          html += '<div class="pm-card" data-payment="' + key + '">' + getPayIcon(key) + '<div class="pm-name">' + _config.ext_list[key] + '</div></div>';
        }
      }
      $('#rcPayGrid').html(html);
    }
    $('#rcPayment').val('');
    $('#rcPaytype').val('');
    $('#rcPaytypeBox').hide();
    $('#rcPaytypeGrid').html('');
    $('#rcPayGrid .pm-card').removeClass('active');
    $('#rcAmountPanel').hide();
    $('#rcPayPanel').show();
    $('#rcPayForm').show();
    if (_context.mode === 'member_upgrade') {
      $('#rcTips').html('会员订单已创建，请选择支付方式完成开通。');
    }
  }

  $(document).on('click', '#recharge-overlay .pm-card', function() {
    $('#recharge-overlay .pm-card').removeClass('active');
    $(this).addClass('active');
    var payment = $(this).attr('data-payment');
    $('#rcPayment').val(payment || '');
    $('#rcPaytype').val('');
    $('#recharge-overlay .pt-card').removeClass('active');
    var sel = findRcMethodByKey(_config && _config.methods, payment);
    var subHtml =
      sel && sel.paytypes && sel.paytypes.length
        ? buildRcPaytypeCardsFromApi(sel.paytypes)
        : '';
    if (subHtml) {
      $('#rcPaytypeGrid').html(subHtml);
      $('#rcPaytypeBox').slideDown();
    } else {
      $('#rcPaytypeGrid').html('');
      $('#rcPaytypeBox').slideUp();
    }
  });

  $(document).on('click', '#recharge-overlay .pt-card', function() {
    $('#recharge-overlay .pt-card').removeClass('active');
    $(this).addClass('active');
    $('#rcPaytype').val($(this).attr('data-type') || '');
  });

  $(document).on('submit', '#rcPayForm', function(e) {
    e.preventDefault();
    var payMethod = String($('#rcPayment').val() || '').trim();
    if (!payMethod) {
      rcStatusErr(rcGetLang('string_pay_zffs_err', '请选择支付方式', 'Select payment method'));
      return false;
    }
    var $actPm = $('#recharge-overlay .pm-card.active');
    var pmFromUi = String($actPm.attr('data-payment') || '').trim();
    if (!$actPm.length || pmFromUi.toLowerCase() !== payMethod.toLowerCase()) {
      rcStatusErr(rcGetLang('string_pay_zffs_err', '请选择支付方式', 'Select payment method'));
      return false;
    }
    var selM = findRcMethodByKey(_config && _config.methods, payMethod);
    if (!selM || Number(selM.enabled) !== 1) {
      rcStatusErr(rcGetLang('string_pay_zffs_err', '请选择支付方式', 'Select payment method'));
      return false;
    }
    var needPaytype = selM.paytypes && selM.paytypes.length > 0;
    if (needPaytype) {
      var ptVal = String($('#rcPaytype').val() || '').trim();
      var $ptActive = $('#recharge-overlay #rcPaytypeGrid .pt-card.active');
      var ptFromUi = String($ptActive.attr('data-type') || '').trim();
      if (!ptVal || !$ptActive.length || ptFromUi !== ptVal) {
        rcStatusErr(rcGetLang('string_pay_zflx_err', '请选择支付类型', 'Select pay type'));
        return false;
      }
      var ptOk = false;
      for (var pi = 0; pi < selM.paytypes.length; pi++) {
        var pto = selM.paytypes[pi];
        if (pto && String(pto.value) === ptVal) {
          ptOk = true;
          break;
        }
      }
      if (!ptOk) {
        rcStatusErr(rcGetLang('string_pay_zflx_err', '请选择支付类型', 'Select pay type'));
        return false;
      }
    }
    var orderId = String($('#rcPayOrderId').val() || '').trim();
    var orderCode = String($('#rcPayOrderCode').val() || '').trim();
    if (!orderId || !orderCode) {
      rcStatusErr(rcGetLang('string_load_err', '订单信息不完整', 'Order incomplete'));
      return false;
    }
    var pk = payMethod.toLowerCase();
    var isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
    var isWeixinMobile = isMobile && pk === 'weixin';
    var postData = {
      order_id: orderId,
      order_code: orderCode,
      payment: payMethod
    };
    var pt = String($('#rcPaytype').val() || '').trim();
    if (pt) postData.paytype = pt;

    $.ajax({
      url: rcGopayUrl(),
      type: 'post',
      dataType: 'text',
      data: postData,
      success: function(text) {
        var r = rcParseGopayResponseText(text);
        if (!r || r.code != 1 || !r.info) {
          rcStatusErr((r && r.msg) || rcGetLang('string_load_err', '发起支付失败', 'Payment start failed'));
          return;
        }
        var pd0 = r.info.payment_data;
        if (pd0 && pd0.type === 'qrcode' && pd0.code_url) {
          enterLoading(pd0.code_url);
          startPoll(orderCode);
          return;
        }
        var opened = rcOpenPaymentChannel(r.info, {
          target: isWeixinMobile ? '_self' : '_blank'
        });
        if (!opened) {
          rcStatusErr(rcGetLang('string_pay_open_fail', '无法打开支付页，请检查支付插件配置或尝试其他支付方式', 'Could not open payment page.'));
          return;
        }
        if (!isWeixinMobile) {
          setTimeout(function() {
            enterLoading();
            startPoll(orderCode);
          }, 300);
        } else {
          enterLoading();
          startPoll(orderCode);
        }
      },
      error: function(xhr) {
        rcStatusErr(rcFriendlyAjaxMessage(xhr));
      }
    });
    return false;
  });

  function enterLoading(weixinCodeUrl) {
    _isPaying = true;
    $('#rcPayForm').hide();
    if (weixinCodeUrl) {
      $('#rcLoadingQrcodeBlock').show().attr('aria-hidden', 'false');
      $('#rcSpinnerWrap').hide();
      $('#rcLoadingHint').html('请使用微信扫码完成支付<br>支付成功后将自动更新');
      var $host = $('#rcLoadingQrcodeHost');
      $host.empty();
      if (typeof window.macRenderPaymentQrcode === 'function') {
        window.macRenderPaymentQrcode($host, weixinCodeUrl, function (err) {
          if (err) rcStatusErr(rcGetLang('string_pay_qr_fail', '二维码生成失败，请刷新重试', 'Could not render QR code.'));
        });
      }
    } else {
      resetRcLoadingVisuals();
    }
    $('#rcLoadingPanel').fadeIn(200);
    $('#rcCloseBtn').prop('disabled', true).css('opacity', '.3');
  }

  function exitLoading() {
    _isPaying = false;
    resetRcLoadingVisuals();
    $('#rcCloseBtn').prop('disabled', false).css('opacity', '');
  }

  function startPoll(orderCode) {
    stopPoll();
    var myGen = ++_pollGen;
    var count = 0;
    function doQuery() {
      if (myGen !== _pollGen) return;
      count++;
      if (count > 30) {
        if (myGen !== _pollGen) return;
        stopPoll();
        exitLoading();
        $('#rcLoadingPanel').hide();
        $('#rcPayForm').fadeIn(200);
        rcStatusErr(rcGetLang('string_pay_poll_timeout', '支付结果查询超时，如已支付请稍后查看金币变化', 'Payment status timeout.'));
        return;
      }
      try {
        if (_pollJqXHR && _pollJqXHR.abort) {
          _pollJqXHR.abort();
        }
      } catch (e) {}
      _pollJqXHR = $.ajax({
        url: rcOrderQueryUrl(),
        type: 'get',
        dataType: 'json',
        data: { order_code: orderCode },
        success: function (r) {
          if (myGen !== _pollGen) return;
          var inf = r && (r.info || r.data);
          if (r.code == 1 && inf && Number(inf.order_status) === 1) {
            stopPoll();
            exitLoading();
            showSuccess(Number(inf.order_points || 0));
          }
        },
        complete: function () {
          _pollJqXHR = null;
        }
      });
    }
    _pollTimer = setInterval(function () {
      if (myGen !== _pollGen) return;
      if (count === 3) {
        clearInterval(_pollTimer);
        _pollTimer = setInterval(doQuery, 10000);
      }
      doQuery();
    }, 5000);
  }

  function stopPoll() {
    if (_pollTimer) {
      clearInterval(_pollTimer);
      _pollTimer = null;
    }
  }

  function abortPaymentPoll() {
    _pollGen++;
    try {
      if (_pollJqXHR && _pollJqXHR.abort) {
        _pollJqXHR.abort();
      }
    } catch (e) {}
    _pollJqXHR = null;
    stopPoll();
  }

  function showSuccess(points) {
    resetRcLoadingVisuals();
    $('#rcLoadingPanel').hide();
    $('#rcPayPanel').hide();
    _isPaying = false;
    var isMemberUp = _context.mode === 'member_upgrade' || _context.orderBiz === 'member_upgrade';
    var $ov = $('#recharge-overlay');
    var benefitsUrl = String($ov.attr('data-url-benefits') || '').trim();
    $ov.removeClass('show');
    $('body').css('overflow', '');
    _afterPayCloseAction = '';
    _context = { mode: 'recharge' };

    if (isMemberUp) {
      if (typeof MAC !== 'undefined' && MAC.Pop && typeof MAC.Pop.VipUpgradeSheet === 'function') {
        MAC.Pop.VipUpgradeSheet({
          benefitsUrl: benefitsUrl,
          onClose: function () {
            try {
              $('.mac_pop_bg,.mac_pop').remove();
            } catch (e) {}
            location.reload();
          }
        });
      } else {
        try {
          $('.mac_pop_bg,.mac_pop').remove();
        } catch (e2) {}
        location.reload();
      }
      return;
    }

    var detail = '';
    if (points > 0) {
      var tpl = rcGetLang('string_mac_recharge_detail_points', '+%s 金币', '+%s points');
      detail = tpl.replace('%s', String(points));
    }
    var title = rcGetLang('string_mac_recharge_ok', '充值成功', 'Recharge successful');
    var needReloadUser = /\/user\//i.test(String(window.location.pathname || ''));
    if (typeof MAC !== 'undefined' && MAC.Pop && typeof MAC.Pop.StatusSheet === 'function') {
      MAC.Pop.StatusSheet({
        type: 'success',
        message: title,
        detail: detail,
        onClose: function () {
          if (needReloadUser) location.reload();
        }
      });
    } else {
      MAC.alert(title + (detail ? '\n' + detail : ''));
      if (needReloadUser) location.reload();
    }
  }

  $(document).on('click', '#rcCancelPoll', function() {
    abortPaymentPoll();
    exitLoading();
    $('#rcLoadingPanel').hide();
    $('#rcPayForm').fadeIn(200);
  });

  function closeModal() {
    if (_isPaying) return;
    abortPaymentPoll();
    var act = _afterPayCloseAction;
    _afterPayCloseAction = '';
    $('#recharge-overlay').removeClass('show');
    $('body').css('overflow', '');
    _context = { mode: 'recharge' };
    if (act === 'reload_pop') {
      try {
        $('.mac_pop_bg,.mac_pop').remove();
      } catch (e) {}
      location.reload();
      return;
    }
    if (act === 'reload') {
      location.reload();
      return;
    }
  }

  $(document).on('click', '#rcCloseBtn', closeModal);
  $(document).on('click', '#recharge-overlay', function(e) {
    if ($(e.target).is('#recharge-overlay')) closeModal();
  });

  var isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
  if (isMobile) {
    $(document).on('click', '#mobileRechargeLink', function(e) {
      var href = ($(this).attr('href') || '').toString();
      if (href.indexOf('user/login') !== -1) {
        return;
      }
      if (typeof window.openRechargeModal === 'function') {
        e.preventDefault();
        window.openRechargeModal();
      }
    });
  }
})();
</script>
