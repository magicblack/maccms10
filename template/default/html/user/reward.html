<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"><head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>推荐记录 - 会员中心 - {$maccms.site_name}</title>
<meta name="keywords" content="">

{include file="user/include" /}
<link rel="stylesheet" href="{$maccms.path_tpl}/asset/css/user-reward.css">
</head>

<body>
{include file="public/head" /}

<div class="member-wrap member-wrap-bg">
<div id="member" class="fn-clear">
	<div id="left">
        <div class="m-nav">
			<a href="javascript:MAC.GoBack()" class="btn-left"><i class="iconfont ico-right">&#xe625;</i></a>
			<a href="{$maccms.path}" class="btn-right"><i class="iconfont ico-right">&#xe634;</i></a>
			<span class="mb-title" data-lang='string_user_center'>个人中心</span>
	    </div>
        {include file="user/left_nav" /}
	</div>
    <div id="right">
    	<div class="m-nav">
			<a href="javascript:MAC.GoBack()" class="btn-left"><i class="iconfont ico-right">&#xe625;</i></a>
			<span class="mb-title" data-lang="string_play_tjjj">推荐记录</span>
	    </div>
	    <div class="co-right co-right-bg"
			data-mac-user-reward
			data-api-base="{:rtrim($maccms.path,'/').'/api.php'}"
			data-url-login="{:url('user/login')}"
			data-initial-level="{$param.level|default='1'}">
		<h2 data-lang="string_play_tjjj">推荐记录</h2>
       <div id="tab">
		<div class="list">
			<ul class="fn-clear">
				<li class="cur" data-reward-level="1" role="button" tabindex="0"><a href="javascript:void(0)" data-lang="string_play_yjhy">一级会员</a></li>
				<li data-reward-level="2" role="button" tabindex="0"><a href="javascript:void(0)" data-lang="string_play_ejhy">二级会员</a></li>
				<li data-reward-level="3" role="button" tabindex="0"><a href="javascript:void(0)" data-lang="string_play_sjhy">三级会员</a></li>
			</ul>
		</div>
		</div>
		<p class="mac-reward-loading muted" data-lang="string_loading">加载中~</p>
		<div data-mac-reward-empty style="display:none;">
			<ul class="order__list clearfix">
				{include file="public/notempty"}
			</ul>
		</div>
		<table width="100%" border="0" cellspacing="1" cellpadding="0" class="table" data-mac-reward-table>
		  <tr>
			<td width="20%" align="center" valign="middle" bgcolor="#f7f7f7" data-lang="string_play_bh">编号</td>
			<td width="30%" align="center" valign="middle" bgcolor="#f7f7f7" data-lang="string_play_hy">会员</td>
			<td width="50%" align="center" valign="middle" bgcolor="#f7f7f7" data-lang="string_play_reward_time">时间</td>
		  </tr>
		  <tbody data-mac-reward-tbody></tbody>
		</table>
		<div class="member-page"></div>

    </div>
    </div>
</div>
<div class="show-pc" style="width:30rem;margin: 2rem auto;">
	{include file="public/friendLink" }
</div>
</div>
<script src="{$maccms.path_tpl}/asset/js/mac-member-list-utils.js"></script>
<script src="{$maccms.path_tpl}/asset/js/user-reward-list.js"></script>
{include file="public/foot" /}
