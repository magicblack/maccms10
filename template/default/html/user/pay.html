<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<title >确认订单 - 会员中心 - {$maccms.site_name}</title>
	<meta name="keywords" content="{$maccms.site_keywords}"/>
	<meta name="description" content="{$maccms.site_description}"/>
	
	{include file="user/include" /}
	<link rel="stylesheet" href="{$maccms.path_tpl}/asset/css/user-pay.css">
</head>
<body>
{include file="public/th" /}
{include file="public/head" /}
<div id="mac-user-pay-root"
	class="member-wrap member-wrap-bg"
	data-url-login="{:url('user/login')}"
	data-url-recharge-config="{:rtrim($maccms.path,'/').'/api.php/payment/get_config'}"
	data-url-gopay="{:rtrim($maccms.path,'/').'/api.php/payment/gopay'}"
	data-url-order-query="{:rtrim($maccms.path,'/').'/api.php/order/check_status'}"
	data-order-code="{$info.order_code}"
	data-order-id="{$info.order_id}">
<div id="member" class="fn-clear">
	<div id="left">
        <div class="m-nav">
			<a href="javascript:MAC.GoBack()" class="btn-left"><i class="iconfont ico-right">&#xe625;</i></a>
			<a href="{$maccms.path}" class="btn-right"><i class="iconfont ico-right">&#xe634;</i></a>
			<span class="mb-title" data-lang='string_user_center'>个人中心</span>
	    </div>
        {include file="user/left_nav" /}
	</div>
	<div id="right">
	    <div class="m-nav">
			<a href="javascript:MAC.GoBack()" class="btn-left"><i class="iconfont ico-right">&#xe625;</i></a>
			<span class="mb-title" data-lang="string_pay_qrdd">确认订单</span>
	    </div>
	    <div class="pay-container">
			<div class="pay-header">
				<h2 data-lang="string_pay_qrdd">确认订单</h2>
			</div>

			<div class="order-summary">
				<div class="order-row">
					<span class="order-label" data-lang="string_pay_ddbh">订单编号</span>
					<span class="order-value">{$info.order_code}</span>
				</div>
				<div class="order-row">
					<span class="order-label" data-lang="string_pay_ddje">订单金额</span>
					<span class="order-value price">{$info.order_price}<span data-lang="user_yuan">元</span></span>
				</div>
			</div>

			<p id="mac-pay-status" class="mac-pay-status-hint" style="display:none;"></p>

			<div class="pay-loading-panel" id="pay_loading_panel" style="display:none;" aria-live="polite">
				<div class="pay-loading-qrcode-block" id="pay_loading_qrcode_block" style="display:none;" aria-hidden="true">
					<div class="pay-loading-qrcode-host" id="pay_loading_qrcode_host"></div>
					<p class="pay-loading-qrcode-caption" data-lang="string_mac_dkwx">打开微信，扫码支付</p>
				</div>
				<div class="pay-loading-spinner-wrap" id="pay_loading_spinner_wrap">
					<div class="pay-loading-spinner"></div>
				</div>
				<h3 id="pay_loading_title">等待支付结果</h3>
				<p id="pay_loading_hint">请在新标签页完成支付<br>支付成功后本页将自动刷新</p>
				<button type="button" class="pay-loading-cancel">我已取消支付</button>
			</div>

			<form method="post" action="#" id="payForm" target="_blank">
				<input type="hidden" name="order_id" value="{$info.order_id}">
				<input type="hidden" name="order_code" value="{$info.order_code}">
				<input type="hidden" name="payment" id="payment_input" value="">
				<input type="hidden" name="paytype" id="paytype_input" value="">

				<div class="pm-section-title" data-lang="string_pay_zffs">支付方式</div>
				<div class="pm-grid" id="payment_grid">
					<div class="pm-loading" data-lang="string_loading">加载中…</div>
				</div>

				<div id="paytype_box" style="display:none;">
					<div class="pm-section-title" data-lang="string_pay_zflx">支付类型</div>
					<div class="pt-grid" id="paytype_grid"></div>
				</div>

				<button type="submit" id="btn_submit" data-value="string_submit" class="pay-confirm-btn">确认支付</button>
			</form>
		</div>
	</div>
</div>
</div>

	<div data-icon="wallet"><svg class="icon" style="vertical-align:middle;fill:currentColor;overflow:hidden" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg"><path d="M880 112H144c-17.7 0-32 14.3-32 32v736c0 17.7 14.3 32 32 32h736c17.7 0 32-14.3 32-32V144c0-17.7-14.3-32-32-32zm-40 464H528V448h312v128zm0 264H184V184h656v200H496c-17.7 0-32 14.3-32 32v192c0 17.7 14.3 32 32 32h344v200zM620 512m-40 0a40 40 0 1 0 80 0 40 40 0 1 0-80 0z"/></svg></div>
</div>

<script src="{$maccms.path_tpl}/asset/js/mac-member-list-utils.js"></script>

</body>
</html>
