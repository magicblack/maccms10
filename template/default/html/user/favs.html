<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"><head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>我的收藏 - 会员中心 - {$maccms.site_name}</title>
<meta name="keywords" content="">
<meta name="description" content="">
{include file="user/include" /}
<link rel="stylesheet" href="{$maccms.path}template/default/asset/css/user-favs.css">
</head>


<body>
{include file="public/head" /}

<div class="member-wrap member-wrap-bg">
<div id="member" class="fn-clear">
	<div id="left">
		<div class="m-nav">
			<a href="{:url('user/index')}" class="btn-left"><i class="iconfont ico-right">&#xe625;</i></a>
			<a href="{$maccms.path}" class="btn-right"><i class="iconfont ico-right">&#xe634;</i></a>
			<span class="mb-title" data-lang="user_grzx">个人中心</span>
	    </div>
        {include file="user/left_nav" /}
	</div>
    <div id="right">
		<div class="m-nav">
			<a href="{:url('user/index')}" class="btn-left"><i class="iconfont ico-right">&#xe625;</i></a>
			<span class="mb-title" data-lang="string_user_fav">我的收藏</span>
			<a href="javascript:;" id="btnClear" class="btn-right" data-lang="string_qk">清空</a>
	    </div>
	    <div class="co-right co-right-bg"
			data-mac-user-ulog
			data-lazy-placeholder="{:mac_url_img(!empty($tplconfig['theme']['lazy']) ? $maccms['path'].$tplconfig['theme']['lazy'] : $maccms['path_tpl'].'asset/img/load.gif')}"
			data-api-base="{:rtrim($maccms.path,'/').'/api.php'}"
			data-ulog-type="2"
			data-page="favs"
			data-is-guest="0"
			data-url-login="{:url('user/login')}">
		<h2 data-lang="string_user_fav">我的收藏</h2>
		<div class="filter-tabs">
			<a href="{:url('user/favs')}" data-mid="0" data-lang="string_all">全部</a>
			<a href="{:url('user/favs',['mid'=>1])}" data-mid="1" data-lang="string_vod">视频</a>
			<a href="{:url('user/favs',['mid'=>2])}" data-mid="2" data-lang="string_art">文章</a>
			<a href="{:url('user/favs',['mid'=>3])}" data-mid="3" data-lang="string_topic">专题</a>
			<a href="{:url('user/favs',['mid'=>12])}" data-mid="12" data-lang="string_manga">漫画</a>
		</div>
		<div class="gong">
			<a href="javascript:;" class="mac-ulog-cb-all" data-lang="string_qx">全选</a>
			<a href="javascript:;" class="mac-ulog-cb-other" data-lang="string_fx">反选</a>
			<a href="javascript:;" id="btnDel" data-lang="string_sc">删除</a>
			<a href="javascript:;" id="btnClear2" data-lang="string_qk">清空</a>
		</div>
		<ul class="data__list clearfix"></ul>
		<p class="mac-ulog-loading muted" data-lang="string_loading">加载中~</p>
		<div class="member-page"></div>
    </div>
    </div>
</div>
<div class="show-pc" style="width:30rem;margin: 2rem auto;">
	{include file="public/friendLink" }
</div>
</div>
<script src="{$maccms.path_tpl}/asset/js/mac-member-list-utils.js"></script>
<script src="{$maccms.path_tpl}/asset/js/user-ulog-lists.js"></script>
{include file="public/foot" /}
</body>
</html>
