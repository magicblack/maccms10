{include file="../../../application/admin/view_new/public/head" /}

<div class="page-container p10">
    <form class="layui-form layui-form-pane" method="post" action="">
        <input id="live_id" name="live_id" type="hidden" value="{$info.live_id}">

        <div class="layui-form-item">
            <label class="layui-form-label">{:lang('admin/live/cate')}：</label>
            <div class="layui-input-inline">
                <select name="cate_id">
                    <option value="0">{:lang('admin/live/no_cate')}</option>
                    {volist name="cate_list" id="cate"}
                    <option value="{$cate.cate_id}" {if condition="$info['cate_id'] eq $cate['cate_id']"}selected{/if}>{$cate.cate_name}</option>
                    {/volist}
                </select>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">{:lang('admin/live/channel_name')}：</label>
            <div class="layui-input-block">
                <input type="text" class="layui-input" value="{$info.live_name}" lay-verify="live_name" placeholder="{:lang('admin/live/channel_name_tip')}" id="live_name" name="live_name">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">{:lang('admin/live/channel_sub')}：</label>
            <div class="layui-input-block">
                <input type="text" class="layui-input" value="{$info.live_sub}" placeholder="" id="live_sub" name="live_sub">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">{:lang('admin/live/channel_en')}：</label>
            <div class="layui-input-inline">
                <input type="text" class="layui-input" value="{$info.live_en}" placeholder="" id="live_en" name="live_en">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">{:lang('admin/live/channel_pic')}：</label>
            <div class="layui-input-block">
                <input type="text" class="layui-input" value="{$info.live_pic}" placeholder="{:lang('admin/live/channel_pic_tip')}" id="live_pic" name="live_pic">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">{:lang('admin/live/play_from')}：</label>
            <div class="layui-input-inline">
                <input type="text" class="layui-input" value="{$info.live_play_from|default='hls'}" placeholder="hls / flv / rtmp" id="live_play_from" name="live_play_from">
            </div>
        </div>

        <div class="layui-form-item layui-form-text">
            <label class="layui-form-label">{:lang('admin/live/play_url')}：</label>
            <div class="layui-input-block">
                <textarea class="layui-textarea" rows="5" placeholder="{:lang('admin/live/play_url_tip')}" id="live_url" name="live_url">{$info.live_url}</textarea>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">{:lang('sort')}：</label>
            <div class="layui-input-inline w100">
                <input type="text" class="layui-input" value="{$info.live_sort|default='0'}" placeholder="" id="live_sort" name="live_sort">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">{:lang('admin/live/level')}：</label>
            <div class="layui-input-inline w100">
                <input type="text" class="layui-input" value="{$info.live_level|default='0'}" placeholder="" id="live_level" name="live_level">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">{:lang('status')}：</label>
            <div class="layui-input-inline">
                <select name="live_status">
                    <option value="1" {if condition="$info['live_status'] eq 1"}selected{/if}>{:lang('enable')}</option>
                    <option value="0" {if condition="$info['live_status'] eq 0"}selected{/if}>{:lang('disable')}</option>
                </select>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">{:lang('admin/live/blurb')}：</label>
            <div class="layui-input-block">
                <input type="text" class="layui-input" value="{$info.live_blurb}" placeholder="" id="live_blurb" name="live_blurb">
            </div>
        </div>

        <div class="layui-form-item layui-form-text">
            <label class="layui-form-label">{:lang('admin/live/content')}：</label>
            <div class="layui-input-block">
                <textarea class="layui-textarea" rows="4" placeholder="" id="live_content" name="live_content">{$info.live_content}</textarea>
            </div>
        </div>

        <div class="layui-form-item center">
            <div class="layui-input-block">
                <button type="submit" class="layui-btn" lay-submit="" lay-filter="formSubmit" data-child="true">{:lang('btn_save')}</button>
                <button class="layui-btn layui-btn-primary" type="reset">{:lang('btn_reset')}</button>
            </div>
        </div>
    </form>
</div>

{include file="../../../application/admin/view_new/public/foot" /}

<script type="text/javascript">
    layui.use(['form', 'layer'], function () {
        var form = layui.form, layer = layui.layer, $ = layui.jquery;
        form.verify({
            live_name: function (value) {
                if (value == "") {
                    return "{:lang('name_empty')}";
                }
            }
        });
    });
</script>

</body>
</html>
